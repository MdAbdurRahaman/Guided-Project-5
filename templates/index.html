<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Disease Classification - Deep Learning Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .main-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }
        .card-header-custom {
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .drop-zone {
            border: 2px dashed rgba(168, 85, 247, 0.5);
            border-radius: 16px;
            padding: 3rem 1.5rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .drop-zone:hover {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }
        .img-preview {
            max-height: 280px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: none;
        }
        .btn-predict {
            background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 12px;
            padding: 0.8rem 2.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }
        .result-badge {
            font-size: 1.5rem;
            font-weight: 800;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            display: inline-block;
        }
        .badge-tumor {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
        }
        .badge-normal {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid #22c55e;
            color: #86efac;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="card-header-custom">
        <h1 class="fw-bold mb-2">🏥 Kidney CT Scan AI Classifier</h1>
        <p class="mb-0 text-white-50">Deep Learning (VGG16 Transfer Learning) & MLOps Pipeline Demonstration</p>
    </div>
    
    <div class="p-4 p-md-5">
        <div class="row g-4 align-items-center">
            <div class="col-md-6">
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div id="uploadPlaceholder">
                        <svg width="48" height="48" fill="none" stroke="#a855f7" viewBox="0 0 24 24" class="mb-3">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <h5 class="fw-bold">Upload Kidney CT Scan</h5>
                        <p class="text-secondary small mb-0">Click or drag & drop JPG / PNG image</p>
                    </div>
                    <img id="imgPreview" class="img-fluid img-preview mx-auto" alt="CT Scan Preview">
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
            </div>

            <div class="col-md-6 text-center text-md-start">
                <div id="resultContainer" class="d-none mb-4">
                    <h6 class="text-uppercase text-secondary fw-bold mb-2">Diagnostic Result</h6>
                    <div id="resultBadge" class="result-badge mb-3">Normal</div>
                    <p id="confidenceText" class="text-white-50 small mb-0"></p>
                </div>
                
                <div class="d-grid gap-2">
                    <button class="btn btn-predict" id="predictBtn" onclick="sendPrediction()" disabled>
                        Run AI Analysis
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let base64Image = "";

    function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result.split(',')[1];
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
                document.getElementById('predictBtn').disabled = false;
            }
            reader.readAsDataURL(file);
        }
    }

    async function sendPrediction() {
        if (!base64Image) return;
        const btn = document.getElementById('predictBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Analyzing CT Scan...';

        try {
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: base64Image })
            });
            const data = await res.json();
            
            const resultBadge = document.getElementById('resultBadge');
            const resultContainer = document.getElementById('resultContainer');
            const confidenceText = document.getElementById('confidenceText');
            
            const pred = data[0].image;
            const conf = data[0].confidence || 95;

            resultContainer.classList.remove('d-none');
            resultBadge.innerText = pred.toUpperCase();
            
            if (pred.toLowerCase() === 'tumor') {
                resultBadge.className = 'result-badge badge-tumor';
            } else {
                resultBadge.className = 'result-badge badge-normal';
            }
            
            confidenceText.innerText = `Model Confidence: ${conf}% | Status: ${data[0].status}`;
        } catch (err) {
            alert('Error during prediction: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Run AI Analysis';
        }
    }
</script>

</body>
</html>
